<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="g6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b5de5"/>
      <stop offset="100%" style="stop-color:#4cc9f0"/>
    </linearGradient>
    <linearGradient id="g7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f72585"/>
      <stop offset="100%" style="stop-color:#9b5de5"/>
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="24" fill="#0a0a1a" stroke="url(#g6)" stroke-width="1.5"/>

  <!-- Document shape -->
  <rect x="22" y="20" width="42" height="52" rx="6" fill="none" stroke="url(#g6)" stroke-width="2.5" opacity="0.9"/>

  <!-- Document lines -->
  <line x1="30" y1="34" x2="56" y2="34" stroke="#9b5de5" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <line x1="30" y1="42" x2="56" y2="42" stroke="#9b5de5" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <line x1="30" y1="50" x2="46" y2="50" stroke="#9b5de5" stroke-width="2" opacity="0.5" stroke-linecap="round"/>

  <!-- AI Spark star -->
  <g filter="url(#glow4)" transform="translate(68,62)">
    <polygon points="0,-14 3,-3 14,0 3,3 0,14 -3,3 -14,0 -3,-3" fill="url(#g7)" opacity="0.95"/>
    <polygon points="0,-7 1.5,-1.5 7,0 1.5,1.5 0,7 -1.5,1.5 -7,0 -1.5,-1.5" fill="white" opacity="0.6"/>
  </g>

  <!-- Small dots -->
  <circle cx="22" cy="20" r="2.5" fill="#4cc9f0" opacity="0.8"/>
  <circle cx="64" cy="20" r="2.5" fill="#9b5de5" opacity="0.8"/>
  <circle cx="22" cy="72" r="2.5" fill="#4361ee" opacity="0.8"/>
</svg>
